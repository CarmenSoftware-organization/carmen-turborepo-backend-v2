# docker-compose.dev.yml
# Build local version — ใช้สำหรับ development บน VM (Alpine Linux / Docker)
# Usage:
#   docker compose -f docker-compose.dev.yml build
#   docker compose -f docker-compose.dev.yml up -d
#   docker compose -f docker-compose.dev.yml logs -f
#
# Run เฉพาะ core (3 services หลัก):
#   docker compose -f docker-compose.dev.yml up -d api-backend-gateway api-micro-business api-micro-keycloak-api

services:
  api-backend-gateway:
    build:
      context: .
      dockerfile: apps/backend-gateway/Dockerfile
    container_name: carmen-api-backend-gateway
    restart: unless-stopped
    ports:
      - "4000:4000"
      - "4001:4001"
    env_file:
      - ./apps/backend-gateway/.env
    environment:
      - NODE_ENV=production
      # Service discovery — ใช้ Docker network hostname
      - BUSINESS_SERVICE_HOST=api-micro-business
      - BUSINESS_SERVICE_PORT=5020
      - BUSINESS_SERVICE_HTTP_PORT=6020
      - AUTH_SERVICE_HOST=api-micro-business
      - AUTH_SERVICE_PORT=5020
      - AUTH_SERVICE_HTTP_PORT=6020
      - CLUSTER_SERVICE_HOST=api-micro-cluster
      - CLUSTER_SERVICE_PORT=5014
      - CLUSTER_SERVICE_HTTP_PORT=6014
      - LICENSE_SERVICE_HOST=api-micro-cluster
      - LICENSE_SERVICE_PORT=5014
      - LICENSE_SERVICE_HTTP_PORT=6014
      - INVENTORY_SERVICE_HOST=api-micro-business
      - INVENTORY_SERVICE_PORT=5020
      - INVENTORY_SERVICE_HTTP_PORT=6020
      - PROCUREMENT_SERVICE_HOST=api-micro-business
      - PROCUREMENT_SERVICE_PORT=5020
      - PROCUREMENT_SERVICE_HTTP_PORT=6020
      - RECIPE_SERVICE_HOST=api-micro-business
      - RECIPE_SERVICE_PORT=5020
      - RECIPE_SERVICE_HTTP_PORT=6020
      - MASTER_SERVICE_HOST=api-micro-business
      - MASTER_SERVICE_PORT=5020
      - MASTER_SERVICE_HTTP_PORT=6020
      - LOG_SERVICE_HOST=api-micro-business
      - LOG_SERVICE_PORT=5020
      - LOG_SERVICE_HTTP_PORT=6020
      - FILE_SERVICE_HOST=api-micro-file
      - FILE_SERVICE_PORT=5007
      - FILE_SERVICE_HTTP_PORT=6007
      - CRONJOB_SERVICE_HOST=api-micro-cronjob
      - CRONJOB_SERVICE_PORT=5012
      - CRONJOB_SERVICE_HTTP_PORT=6012
      - KEYCLOAK_API_SERVICE_HOST=api-micro-keycloak-api
      - KEYCLOAK_API_SERVICE_PORT=5013
      - KEYCLOAK_API_SERVICE_HTTP_PORT=6013
      - NOTIFICATION_SERVICE_HOST=api-micro-notification
      - NOTIFICATION_SERVICE_PORT=5006
      - NOTIFICATION_SERVICE_HTTP_PORT=6006
    networks:
      - carmen-network
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:4000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  api-micro-cluster:
    build:
      context: .
      dockerfile: apps/micro-cluster/Dockerfile
    container_name: carmen-api-micro-cluster
    restart: unless-stopped
    ports:
      - "5014:5014"
      - "6014:6014"
    env_file:
      - ./apps/micro-cluster/.env
    environment:
      - NODE_ENV=production
      - KEYCLOAK_API_SERVICE_HOST=api-micro-keycloak-api
      - KEYCLOAK_API_SERVICE_PORT=5013
    networks:
      - carmen-network
    depends_on:
      - api-backend-gateway
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:6014/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  api-micro-business:
    build:
      context: .
      dockerfile: apps/micro-business/Dockerfile
    container_name: carmen-api-micro-business
    restart: unless-stopped
    ports:
      - "5020:5020"
      - "6020:6020"
    env_file:
      - ./apps/micro-business/.env
    environment:
      - NODE_ENV=production
    networks:
      - carmen-network
    depends_on:
      - api-backend-gateway
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:6020/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  api-micro-keycloak-api:
    build:
      context: .
      dockerfile: apps/micro-keycloak-api/Dockerfile
    container_name: carmen-api-micro-keycloak-api
    restart: unless-stopped
    ports:
      - "5013:5013"
      - "6013:6013"
    env_file:
      - ./apps/micro-keycloak-api/.env
    environment:
      - NODE_ENV=production
    networks:
      - carmen-network
    depends_on:
      - api-backend-gateway

  api-micro-file:
    build:
      context: .
      dockerfile: apps/micro-file/Dockerfile
    container_name: carmen-api-micro-file
    restart: unless-stopped
    ports:
      - "5007:5007"
      - "6007:6007"
    env_file:
      - ./apps/micro-file/.env
    environment:
      - NODE_ENV=production
    networks:
      - carmen-network
    depends_on:
      - api-backend-gateway

  api-micro-notification:
    build:
      context: .
      dockerfile: apps/micro-notification/Dockerfile
    container_name: carmen-api-micro-notification
    restart: unless-stopped
    ports:
      - "5006:5006"
      - "6006:6006"
    env_file:
      - ./apps/micro-notification/.env
    environment:
      - NODE_ENV=production
      - NOTIFICATION_SERVICE_HOST=0.0.0.0
      - NOTIFICATION_SERVICE_PORT=5006
      - NOTIFICATION_SERVICE_HTTP_PORT=6006
    networks:
      - carmen-network
    depends_on:
      - api-backend-gateway
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:6006/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  api-micro-cronjob:
    build:
      context: .
      dockerfile: apps/micro-cronjob/Dockerfile
    container_name: carmen-api-micro-cronjob
    restart: unless-stopped
    ports:
      - "5012:5012"
      - "6012:6012"
    env_file:
      - ./apps/micro-cronjob/.env
    environment:
      - NODE_ENV=production
    networks:
      - carmen-network
    depends_on:
      - api-backend-gateway

networks:
  carmen-network:
    driver: bridge
    name: carmen-network
