name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production

    services:
      turbo-cache:
        image: ducktors/turborepo-remote-cache:latest
        ports:
          - 3333:3000
        env:
          STORAGE_PROVIDER: s3
          S3_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY_ID }}
          S3_SECRET_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          S3_BUCKET: bun-cache
          S3_REGION: ap-southeast-7
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

    strategy:
      fail-fast: false
      matrix:
        service:
          - backend-gateway
          - micro-business
          - micro-cronjob
          - micro-file
          - micro-keycloak-api
          - micro-notification

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --ignore-scripts

      - name: Build packages & app (with remote cache)
        run: |
          bunx turbo run build:package build --api="http://localhost:3333" --token="${{ secrets.TURBO_TOKEN }}" --team="carmen"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image metadata
        id: meta
        run: echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/${{ matrix.service }}/Dockerfile
          push: true
          platforms: linux/arm64
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ secrets.DOCKER_IMAGE_PREFIX }}-${{ matrix.service }}:${{ steps.meta.outputs.short_sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ secrets.DOCKER_IMAGE_PREFIX }}-${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy-ec2:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Verify SSM connectivity
        run: |
          echo "Region: $AWS_REGION"
          echo "Checking SSM agent status..."
          aws ssm describe-instance-information \
            --filters "Key=InstanceIds,Values=${{ secrets.INSTANCE_ID }}" \
            --region ${{ secrets.AWS_REGION }} \
            --query 'InstanceInformationList[0].PingStatus' --output text

      - name: Deploy to EC2 via SSM
        env:
          INSTANCE_ID: ${{ secrets.INSTANCE_ID }}
          ECR_REGISTRY: ${{ secrets.AWS_ECR_REGISTRY }}
          IMAGE_PREFIX: ${{ secrets.DOCKER_IMAGE_PREFIX }}
          GH_TOKEN_SECRET: ${{ secrets.GH_TOKEN }}
          SSM_REGION: ${{ secrets.AWS_REGION }}
        run: |
          IMAGE_TAG=$(echo "${{ github.sha }}" | cut -c1-7)

          COMMAND_ID=$(aws ssm send-command \
            --region "$SSM_REGION" \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 1800 \
            --comment "Deploy SHA: $IMAGE_TAG" \
            --parameters '{"commands":["#!/bin/bash","set -e","export HOME=/root","export PATH=/usr/local/bin:/usr/bin:/bin:$PATH","export AWS_DEFAULT_REGION='"$SSM_REGION"'","export ECR_REGISTRY='"$ECR_REGISTRY"'","export IMAGE_PREFIX='"$IMAGE_PREFIX"'","export IMAGE_TAG='"$IMAGE_TAG"'","aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY","PROJECT_DIR=/home/ec2-user/carmen-turborepo-backend-v2","git config --global --add safe.directory $PROJECT_DIR","if [ ! -d $PROJECT_DIR ]; then git clone https://'"$GH_TOKEN_SECRET"'@github.com/${{ github.repository }}.git $PROJECT_DIR; fi","cd $PROJECT_DIR","git remote set-url origin https://'"$GH_TOKEN_SECRET"'@github.com/${{ github.repository }}.git","git fetch origin main","git reset --hard origin/main","docker-compose down --remove-orphans","docker-compose pull","docker-compose up -d","docker image prune -f","echo Deployment Complete for SHA: '"$IMAGE_TAG"'","docker-compose ps"]}' \
            --query 'Command.CommandId' --output text)

          echo "SSM Command ID: $COMMAND_ID"
          echo "Waiting for deployment to complete..."

          # Poll for completion
          for i in $(seq 1 60); do
            sleep 10
            STATUS=$(aws ssm get-command-invocation \
              --region "$SSM_REGION" \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query 'Status' --output text 2>/dev/null || echo "Pending")

            echo "  Status: $STATUS (attempt $i/60)"

            if [ "$STATUS" = "Success" ]; then
              echo "Deployment completed successfully!"
              aws ssm get-command-invocation \
                --region "$SSM_REGION" \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query 'StandardOutputContent' --output text
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              echo "::error::Deployment failed with status: $STATUS"
              aws ssm get-command-invocation \
                --region "$SSM_REGION" \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query 'StandardErrorContent' --output text
              exit 1
            fi
          done

          echo "::error::Deployment timed out after 10 minutes"
          exit 1