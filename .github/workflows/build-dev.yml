name: Deploy Dev

on:
  push:
    branches: [DEV]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/DEV'
    environment: development

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEV_SSH_HOST }}
          username: ${{ secrets.DEV_SSH_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          port: ${{ secrets.DEV_SSH_PORT }}
          command_timeout: 30m
          script: |
            set -e
            export PATH="/usr/local/bin:/root/.bun/bin:$PATH"
            BUN=/usr/local/bin/bun
            PROJECT_DIR=/root/carmen-turborepo-backend-v2

            echo "=== [1/4] Pull origin/DEV ==="
            if [ ! -d "$PROJECT_DIR" ]; then
              git clone https://${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }}.git "$PROJECT_DIR"
            fi
            cd "$PROJECT_DIR"
            git remote set-url origin https://${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }}.git
            git fetch origin DEV
            git checkout DEV
            git reset --hard origin/DEV

            echo "=== [2/4] Install dependencies ==="
            $BUN install

            echo "=== [3/4] Build ==="
            NODE_OPTIONS=--max-old-space-size=6144 $BUN run build

            echo "=== [4/4] Restart services ==="
            ./scripts/start-dev.sh restart all

            echo "=== Service status ==="
            ./scripts/start-dev.sh status || true
