apiVersion: apps/v1
kind: Deployment
metadata:
  name: micro-cronjob
  namespace: carmen-backend
  labels:
    app: micro-cronjob
spec:
  replicas: 1
  selector:
    matchLabels:
      app: micro-cronjob
  template:
    metadata:
      labels:
        app: micro-cronjob
    spec:
      containers:
        - name: micro-cronjob
          image: carmen-micro-cronjob:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: tcp
              containerPort: 5012
            - name: http
              containerPort: 6012
          envFrom:
            - configMapRef:
                name: service-discovery
            - secretRef:
                name: carmen-backend-secret
            - secretRef:
                name: micro-cronjob-env
                optional: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: micro-cronjob
  namespace: carmen-backend
  labels:
    app: micro-cronjob
spec:
  type: ClusterIP
  selector:
    app: micro-cronjob
  ports:
    - name: tcp
      port: 5012
      targetPort: 5012
    - name: http
      port: 6012
      targetPort: 6012
