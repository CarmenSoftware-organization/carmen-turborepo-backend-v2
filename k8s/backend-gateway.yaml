apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-gateway
  namespace: carmen-backend
  labels:
    app: backend-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend-gateway
  template:
    metadata:
      labels:
        app: backend-gateway
    spec:
      containers:
        - name: backend-gateway
          image: carmen-backend-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 4000
            - name: https
              containerPort: 4001
          env:
            - name: GATEWAY_SERVICE_HOST
              value: "0.0.0.0"
          envFrom:
            - configMapRef:
                name: service-discovery
            - secretRef:
                name: carmen-backend-secret
            - secretRef:
                name: backend-gateway-env
                optional: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 20
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: backend-gateway
  namespace: carmen-backend
  labels:
    app: backend-gateway
spec:
  type: NodePort
  selector:
    app: backend-gateway
  ports:
    - name: http
      port: 4000
      targetPort: 4000
      nodePort: 30400
    - name: https
      port: 4001
      targetPort: 4001
      nodePort: 30401
