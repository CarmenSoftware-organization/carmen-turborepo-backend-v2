apiVersion: apps/v1
kind: Deployment
metadata:
  name: micro-cluster
  namespace: carmen-backend
  labels:
    app: micro-cluster
spec:
  replicas: 1
  selector:
    matchLabels:
      app: micro-cluster
  template:
    metadata:
      labels:
        app: micro-cluster
    spec:
      containers:
        - name: micro-cluster
          image: carmen-micro-cluster:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: tcp
              containerPort: 5014
            - name: http
              containerPort: 6014
          env:
            - name: CLUSTER_SERVICE_HOST
              value: "0.0.0.0"
          envFrom:
            - configMapRef:
                name: service-discovery
            - secretRef:
                name: carmen-backend-secret
            - secretRef:
                name: micro-cluster-env
                optional: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 6014
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 6014
            initialDelaySeconds: 20
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: micro-cluster
  namespace: carmen-backend
  labels:
    app: micro-cluster
spec:
  type: ClusterIP
  selector:
    app: micro-cluster
  ports:
    - name: tcp
      port: 5014
      targetPort: 5014
    - name: http
      port: 6014
      targetPort: 6014
